name: 正式书建议
description: 对正式书结构、附录、案例、章节顺序提出建议。
title: "book-v2: "
labels:
  - book-v2
body:
  - type: textarea
    id: suggestion
    attributes:
      label: 建议内容
      description: 请说明你希望正式书增加、删减或重写什么。
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 为什么这很重要
      description: 请说明这个建议会帮助哪类读者。
    validations:
      required: true
