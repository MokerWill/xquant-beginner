name: 实验结果不一致
description: 反馈运行 spec 或 notebook 后，结果和书中不一致。
title: "experiment: "
labels:
  - experiment
body:
  - type: input
    id: chapter
    attributes:
      label: 章节
    validations:
      required: true
  - type: input
    id: spec
    attributes:
      label: Spec 或 notebook
      description: 例如：q5-how-to-validate/specs/spec-02-annual-breakdown.md
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 书中结果
      description: 请写出书中对应的数字、图表或结论。
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 你的结果
      description: 请写出你运行出的数字、图表差异或错误信息。
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 操作系统、Python 版本、运行日期、使用的 AI 工具。
    validations:
      required: true
