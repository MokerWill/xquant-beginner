name: 错别字或排版问题
description: 报告错别字、标点、链接、图片或排版问题。
title: "typo: "
labels:
  - typo
body:
  - type: input
    id: chapter
    attributes:
      label: 章节
      description: 例如：第 3 章：给 ETF 分钱
    validations:
      required: true
  - type: input
    id: section
    attributes:
      label: 小节
      description: 例如：3.2 风险平价
    validations:
      required: true
  - type: textarea
    id: original
    attributes:
      label: 原文片段
      description: 请粘贴需要修正的原文。
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: 建议修改
      description: 请写出你建议改成什么。
    validations:
      required: true
